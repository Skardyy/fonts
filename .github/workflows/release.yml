name: build-and-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync deps
        run: uv sync

      - name: Build fonts from fonts.toml
        run: uv run scripts/build.py

      - name: Collect manual fonts (if any)
        run: |
          shopt -s nullglob
          for f in manual/*.tar.gz manual/*.ttf manual/*.otf; do cp "$f" dist/; done
          ls -la dist/

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          fail_on_unmatched_files: true

      - name: Upload artifacts (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: font-tarballs
          path: dist/*.tar.gz
